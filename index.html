<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<!-- 진짜 반응형: 디바이스 폭을 그대로 사용하고 컨텐츠가 가로로 늘어남(fluid).
     393px(iPhone 15 Pro)은 네이티브, 그보다 넓거나 좁은 디바이스에서는 카드가 가로로 확장/수축.
     viewport-fit=cover: 노치/홈 인디케이터 영역까지 화면 사용 + env(safe-area-inset-*) 활성화 */ -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>더보기탭</title>

<!-- ===== PWA / Add to Home Screen 설정 =====
     사파리에서 "공유 → 홈 화면에 추가" 후 홈 아이콘으로 열면 standalone 모드(사파리 UI 없음)로 실행됨.
     실제 앱처럼 동작하는 목업 경험 제공. -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="더보기탭" />
<meta name="theme-color" content="#ffffff" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/app_icon_180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/app_icon_192.png" />

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --gray900: #191919;
    --gray800: #333333;
    --gray700: #595959;
    --gray600: #595959;
    --gray500: #767676;
    --gray400: #999999;
    --gray300: #b3b3b3;
    --gray200: #d9d9d9;
    --gray150: #e6e6e6;
    --gray100: #f2f2f2;
    --gray075: #f5f5f5;
    --gray050: #f7f7f7;
    --white: #ffffff;
    --red500: #f4551e;
    --point-red: #f04452;
    --point-blue: #2f7ff5;
    --chat-yellow: #fae100;
    --line: rgba(0, 0, 0, 0.14);
    --card-border: rgba(0, 0, 0, 0.04);
    --img-border: rgba(0, 0, 0, 0.03);
    --dim-border: rgba(255, 255, 255, 0.16);
    /* Safe-area: PWA standalone 모드에서 노치/홈인디케이터 영역 자동 대응
       (일반 사파리에서는 0으로 fallback) */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  /* 전역 폰트 강제 — 모든 요소에 Pretendard 강제 적용 */
  *, *::before, *::after {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif !important;
  }
  html, body, button, input, select, textarea {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #ffffff;
    color: var(--gray900);
    display: flex;
    justify-content: center;
    padding-bottom: 49px; /* tab-bar 높이 — 콘텐츠가 고정 탭바 아래로 가지 않도록 */
  }

  .device {
    /* Fluid container — full device width
       NOTE: overflow:hidden 제거. .top이 sticky이므로 page(<html>)가
       nearest scroll ancestor여야 함. overflow:hidden이 걸리면 .device가
       scroll container가 되어 sticky가 작동하지 않음. */
    width: 100%;
    background: #ffffff;
    position: relative;
  }

  /* BG (Gradation)_최종버전 — 1321:3703
     Base: #f5f5f5  |  Top 54px: white→#f5f5f5  |  Bottom 222px: #f5f5f5→white
     Regular: header 104 ↔ tab-bar 49 / Standalone(PWA): header 104+safe-top ↔ tab-bar 49+safe-bottom */
  .bg-gradient {
    position: absolute;
    top: 104px; left: 0; right: 0;
    bottom: 49px;
    background: #f5f5f5;
    z-index: 0;
    pointer-events: none;
  }
  .bg-gradient::before {
    /* BG gradation 1 — top 54px: white → #f5f5f5 */
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    background: linear-gradient(to bottom, #ffffff 0%, #f5f5f5 100%);
  }
  .bg-gradient::after {
    /* BG gradation 3 — bottom 222px: #f5f5f5 → white */
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 222px;
    background: linear-gradient(to bottom, #f5f5f5 0%, #ffffff 100%);
  }

  /* ===== TOP =====
     Sticky at top of viewport; hides on scroll down, shows on scroll up.
     Height: main-tab 56 + chip-bar 48 = 104px (+safe-top in PWA standalone for notch)
     position:sticky로 flow 안에 자리 잡기 때문에 .feed의 padding-top 오프셋 불필요.
     Reveal(→visible)는 빠르게 160ms, hide(→hidden)는 240ms로 약간 느리게(자연스러운 사라짐) */
  .top {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: #ffffff;
    transition: transform 160ms cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }
  .top.is-hidden {
    transform: translateY(-100%);
    transition-duration: 240ms;
  }

  /* Scroll Divider — Figma 1387:1007
     chip-bar bottom 끝에 0.5px 실선(GRAY150A rgba(0,0,0,0.12)).
     스크롤이 최상단일 때는 숨김, 아래로 스크롤 시작하면 즉시 표시(페이드 없음). */
  .top::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 0.5px;
    background: rgba(0, 0, 0, 0.12);
    opacity: 0;
    pointer-events: none;
  }
  .top.has-scroll::after {
    opacity: 1;
  }

  /* Main tab (Figma: 1321:3710) — px-16, h-56, justify-between */
  .main-tab {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    background: #ffffff;
  }
  /* Title Type wrapper (Figma: I1321:3713;30471:3282) — h-56, pr-12, py-8 */
  .main-tab .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 56px;
    padding: 8px 12px 8px 0;
    gap: 10px;
  }
  .main-tab .logo {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 700;
    font-size: 23px;
    line-height: normal;
    color: #191919;
    white-space: nowrap;
  }
  /* Trailing controls (Figma: 1321:3714) — gap-9, h-56, justify-end */
  .main-tab .actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 9px;
    height: 56px;
  }
  /* Icon Button (Figma: Trailing Button) — px-4 py-16, icon size 24 → click area 32x56 */
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 16px 4px;
    background: transparent;
    border: 0;
    cursor: pointer;
    position: relative;
  }
  .icon-btn img,
  .icon-btn svg {
    display: block;
    width: 24px;
    height: 24px;
  }

  /* Top Chip - XLarge (Figma: 1321:3715) — chip set starts at left:16, top:0 */
  .chip-bar {
    height: 48px;
    padding: 0 16px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    background: #ffffff;
  }
  /* A. Tab / 01. XLarge (Figma: 1321:3717) — h-38, px-16 py-10, gap-4, rounded-40
     border 두께(1px)는 active/inactive 공통으로 유지하여 box-model 폭이 변하지 않도록 함.
     inactive는 실선(rgba 0,0,0,0.14), active는 배경과 같은 색으로 "보이지 않는 1px" 처리.
     → chip-bar는 공통 컨테이너로서 위치 고정, 칩은 상태(배경/테두리/글자색)만 토글. */
  .chip {
    height: 38px;
    padding: 10px 16px;
    border-radius: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: normal;
    text-align: center;
    background: #ffffff;
    color: #191919;
    border: 1px solid rgba(0, 0, 0, 0.14);
    position: relative;
    white-space: nowrap;
    /* 상태 전환 시에도 flex gap/배치가 미세 떨리지 않게 */
    box-sizing: border-box;
    transition: background-color 120ms linear, color 120ms linear, border-color 120ms linear;
  }
  /* Chip text inner — min-w-14 per Figma token */
  .chip > .chip-txt {
    display: inline-block;
    min-width: 14px;
    text-align: center;
  }
  /* A. Tab / 01. XLarge — selected state (Figma: 1321:3720) — bg #191919
     ※ border는 유지(두께 1px 동일)하되 색상만 #191919로 — 시각적으로는 "테두리 없음"처럼 보이고
        layout 폭은 inactive 상태와 완벽히 동일하여 다른 칩 위치가 움직이지 않음. */
  .chip.active {
    background: #191919;
    color: #ffffff;
    border-color: #191919;
  }

  /* ===== FEED =====
     .top은 position:sticky로 flow에 자리 잡으므로 padding-top 오프셋 불필요.
     하단 .tab-bar(fixed 49px)만큼만 padding-bottom으로 확보.
     Standalone(PWA): media query에서 safe-area 추가. */
  .feed {
    position: relative;
    z-index: 5;
    padding: 0 0 20px; /* 마지막 요소 아래 시각적 여백 20px만 */
  }

  /* ===== Share row (info+share) — Figma 1321:3799 =====
     Container: flex items-start justify-between
     info (left): pl-2px pt-6px — text/bar offset downward to align with btn center
     share btn (right): 34×34, p-8px, rounded-28px, border rgba(0,0,0,0.08) */
  .info-share {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .info-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-left: 2px;
    padding-top: 6px;
  }
  .info-tag .bar {
    display: inline-block;
    width: 1.5px;
    height: 13px;
    background: #b2b2b2; /* GRAY400S */
    border-radius: 40px;
  }
  .info-tag .txt {
    font-size: 14px;
    line-height: 17px;
    color: #767676; /* GRAY550S */
    letter-spacing: 0;
    white-space: nowrap;
  }
  .share-btn {
    width: 34px;
    height: 34px;
    padding: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 28px;
    border: 1px solid rgba(0, 0, 0, 0.08); /* GRAY100A */
    background: transparent;
    cursor: pointer;
    box-sizing: border-box;
  }
  .share-btn img,
  .share-btn svg { width: 18px; height: 18px; color: var(--gray700); display: block; }

  /* ===== Card (white background cards) =====
     node 1321:3723 등 — 16px radius, white bg, subtle border.
     Fluid width: 화면 폭에서 좌우 16px 마진을 뺀 만큼 가로로 늘어남 (393px 디자인 기준 폭은 361px). */
  .card {
    margin: 0 16px;
    background: #ffffff;
    box-shadow: 0px 0.5px 4px rgba(0, 0, 0, 0.02);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 14px 16px 12px;
    position: relative;
  }

  /* Title — 18px bold (semantic: h2) */
  .card-title {
    font-weight: 700;
    font-size: 18px;
    color: var(--gray900);
    line-height: 1.4;
    letter-spacing: -0.3px;
    margin: 6px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title .tag-reserve {
    /* Figma 1321:3986 — Tag/예약
       bg #fee500, padding 4px, gap 1px, radius 5px
       text Pretendard SemiBold 11px/1.15 black, icon 12×12 */
    display: inline-flex;
    align-items: center;
    gap: 1px;
    padding: 4px;
    background: #fee500;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #000;
    line-height: 1.15;
    letter-spacing: 0;
  }
  .card-title .tag-reserve img,
  .card-title .tag-reserve svg {
    width: 12px;
    height: 12px;
    flex: none;
  }
  /* Figma 1321:3795 — 장소 info row
     - items-start, gap 4px, font-size 16px, leading 1.52, color GRAY600S #595959
     - letter-spacing 0, margin-top 4px
     - .star: RED500S #f4551e, font-weight 500 (Medium), icon 12×12 gap 2px
     - .dot-sep: "∙" character rendered at 15px in GRAY600S (between review count and address) */
  .card-meta {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    margin-top: 4px;
    font-size: 16px;
    line-height: 1.52;
    color: var(--gray600);
    letter-spacing: 0;
  }
  .card-meta .star {
    color: var(--red500);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .card-meta .dot-sep {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 8px;
    height: 24px;
    color: var(--gray600);
    font-size: 15px;
    line-height: 1;
    letter-spacing: 0;
  }
  .card-meta .dot-sep::before {
    content: '∙';
  }

  /* Figma 1321:3795 — card description, GRAY900S #191919 */
  .card-desc {
    font-size: 16px;
    line-height: 1.52rem;
    color: #191919;
    letter-spacing: -0.3px;
    /* card-title(h2) ↔ card-desc 간격: 4px */
    margin-top: 4px;
    /* card-desc ↔ thumb-row 간격: 14px */
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* 1321:3731 3-thumbnail frame — fluid
     - flex gap 2px
     - each cell: 종횡비 119/111 유지 (디자인 기준 119px 가로 × 111px 세로)
     - left cell: 12px radius tl/bl, right cell: 12px radius tr/br, middle: 0
     - images object-cover */
  .thumb-row {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 2px;
  }
  .thumb-row > .cell {
    flex: 1 1 0;
    min-width: 0;
    aspect-ratio: 119 / 111;
    position: relative;
    border: 1px solid var(--img-border);
    overflow: hidden;
  }
  .thumb-row > .cell:first-child {
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
  }
  .thumb-row > .cell:last-child {
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
  }
  .thumb-row > .cell img {
    /* Image overflows the 1px cell border on all sides so the image fills
       the entire cell area (111px full), keeping the inter-image visible gap
       exactly 2px (matching the .thumb-row `gap: 2px` setting). */
    position: absolute;
    inset: -1px;
    width: calc(100% + 2px);
    height: calc(100% + 2px);
    object-fit: cover;
    display: block;
  }

  /* Figma 1321:3795 — bullet description list
     - flex column, 6px gap between items, 14px gap to next block (e.g. thumb-row)
     - item: gap 4px, font-size 16px, line-height 1.52, color GRAY900S #191919, letter-spacing 0 */
  .bullet-list {
    margin-top: 12px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bullet-item {
    display: flex;
    gap: 4px;
    align-items: flex-start;
    font-size: 16px;
    line-height: 1.52;
    color: #191919;
    letter-spacing: 0;
  }
  /* 8×26 container with 3px centered dot — matches Figma Dot component */
  .bullet-item::before {
    content: '';
    flex: none;
    width: 8px;
    height: 26px;
    background-image: radial-gradient(circle at center, #191919 1.5px, transparent 1.6px);
    background-repeat: no-repeat;
    background-position: center;
  }

  .feedback {
    text-align: right;
    font-size: 13px;
    line-height: 17px;
    color: var(--gray400);
    margin-top: 14px;
    letter-spacing: -0.2px;
  }

  /* ===== Card News (card_news_01) =====
     Fluid 정사각형 — 가로는 16px 좌우 마진 빼고 가득, 높이는 aspect-ratio 1/1로 따라감.
     overflow-clip, dim_blur overlay, content aligned bottom
     Border radius 16px, light 4% border */
  .card-news {
    aspect-ratio: 1 / 1;
    margin: 0 16px;
    border: 1px solid var(--card-border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    color: #ffffff;
  }
  /* 마지막 카드 하단 여백은 .feed padding-bottom 20px + body padding-bottom 49px으로 처리 */
  .card-news > .cn-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .card-news > .cn-bg img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* card_news_01 (1321:3775) has image offset: top-[-9.69%], h-[143.2%] */
  .card-news.variant1 > .cn-bg img {
    height: 143.2%;
    top: -9.69%;
    object-position: center;
  }
  .card-news > .cn-dim {
    /* dim_blur — 1321:3776
       size 361×361, top/left -1px
       backdrop-blur(16px), bg-gradient-to-b from transparent at 0% to rgba(0,0,0,0.16) at 50%, holds to 100%
       Blur visibility confined to the bottom ~25-45% area via mask,
       matching Figma where the blur appears only under the title/description text. */
    position: absolute;
    inset: -1px;
    z-index: 1;
    pointer-events: none;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.16) 50%, rgba(0,0,0,0.16) 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 42%, rgba(0,0,0,1) 55%, rgba(0,0,0,1) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 42%, rgba(0,0,0,1) 55%, rgba(0,0,0,1) 100%);
  }
  .card-news > .cn-content {
    position: relative;
    z-index: 2;
    flex: 1 0 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 14px;
  }
  .cn-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
    width: 100%;
  }
  .cn-title {
    font-weight: 700;
    font-size: 18px;
    line-height: 1.4;
    color: #ffffff;
    letter-spacing: -0.3px;
    margin: 0;
    width: 100%;
  }
  .cn-desc {
    font-weight: 400;
    font-size: 16px;
    line-height: 1.52;
    color: #ffffff;
    letter-spacing: -0.2px;
    margin: 0;
    width: 100%;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cn-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 34px;
  }
  .cn-meta .info-tag .bar { background: rgba(255,255,255,1); width: 1.5px; height: 13px; }
  .cn-meta .info-tag .txt { color: #ffffff; }
  .cn-meta .share-btn {
    border-color: var(--dim-border);
    background: transparent;
  }
  .cn-meta .share-btn svg { color: #ffffff; }

  /* ===== Place list row ===== */
  .place-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  /* 13px spacing between consecutive place-row items */
  .place-row + .place-row { margin-top: 13px; }
  .place-row .place-img {
    width: 68px;
    height: 68px;
    border-radius: 10px;
    border: 1px solid var(--img-border);
    background: #eee;
    overflow: hidden;
    flex-shrink: 0;
  }
  .place-row .place-img img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  /* ===== Bottom Tab Bar — Figma 1321:4018 =====
     Structure: 5 Tab (49px, #fff) + Home Indicator area (34px)
     Top edge of .tabs uses a subtle 1px divider line (GRAY100A) instead of shadow.
     Fixed to bottom of viewport so tabs + home indicator are always visible regardless of scroll.
     Standalone(PWA)에서는 iOS가 실제 home indicator를 그려주므로 fake .home-indicator-area를 숨기고
     safe-bottom 만큼 padding으로 대체(하단 media query에서 처리). */
  .tab-bar {
    background: #ffffff;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
  }
  .tab-bar .tabs {
    height: 49px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    overflow: hidden;
    touch-action: none;
    /* 1px top divider (Figma tab_shadow replaced with a hairline, GRAY100A) */
    border-top: 1px solid rgba(0, 0, 0, 0.08);
  }
  .tab-bar .tab {
    width: 64px;
    height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .tab-bar .tab.openchat { width: 65px; }
  .tab-bar .tab img { width: 28px; height: 28px; display: block; }
  .tab-bar .tab .dot-badge {
    /* Tab 5 Badge — RED500S #f4551e, 4×4, top 2px from Ico&Badge top */
    position: absolute;
    top: 12px;
    left: calc(50% + 12px);
    width: 4px;
    height: 4px;
    background: #f4551e;
    border-radius: 50%;
  }
  /* ===== Safe-area (노치/홈인디케이터) 통합 처리 =====
     .home-indicator-area 가짜 34px 제거. 대신:
     - Regular browser: env()가 0으로 fallback → 추가 padding 없음 (tab-bar = 49px)
     - PWA standalone: iOS가 실제 safe-area 값 반환 → 자동으로 상/하단 여백 확보
     이중 분기: @media (display-mode: standalone) + html[data-standalone="true"] */
  @media all and (display-mode: standalone) {
    .top { padding-top: env(safe-area-inset-top, 0px); }
    .tab-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
    body {
      padding-bottom: calc(49px + env(safe-area-inset-bottom, 0px));
    }
    .bg-gradient {
      top: calc(104px + env(safe-area-inset-top, 0px));
      bottom: calc(49px + env(safe-area-inset-bottom, 0px));
    }
  }
  html[data-standalone="true"] .top { padding-top: env(safe-area-inset-top, 0px); }
  html[data-standalone="true"] .tab-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
  html[data-standalone="true"] body {
    padding-bottom: calc(49px + env(safe-area-inset-bottom, 0px));
  }
  html[data-standalone="true"] .bg-gradient {
    top: calc(104px + env(safe-area-inset-top, 0px));
    bottom: calc(49px + env(safe-area-inset-bottom, 0px));
  }

     "공유 → 홈 화면에 추가"로 PWA 설치 유도. JS에서 iOS Safari 감지해서 표시. */
  .a2hs-banner {

     white bg rounded 10, padding top/left/right 12, bottom 16 (요청 반영). */

  /* Service Shortcut: 가로 스와이프 3페이지 + 인디케이터
     .service-pages: overflow-x scroll-snap 컨테이너
     .service-page: 각 페이지 = 4x3 grid
     iOS 26 스와이프 강도 맞춤:
       - scroll-behavior 컨테이너 제거 → 터치 이벤트는 OS 네이티브 물리엔진 직접 사용
         (dot 클릭 smooth는 JS scrollTo({ behavior:'smooth' })가 별도 처리)
       - overscroll-behavior-x: contain → 부모로 스크롤 체인 차단, 앱과 동일한 경계감
       - touch-action: pan-x → 수평 스와이프 전용 힌트로 응답 지연(300ms) 제거 */
  .service-pages {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
    touch-action: pan-x;
    scrollbar-width: none;
    width: 100%;
  }

  .service-page {

    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
  }

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
  }

    height: 71px;

    align-items: center;
    position: relative;

  }

  .service-icon img { display: block; width: 38px; height: 38px; }
  .service-icon .dot-badge {
    position: absolute; top: 0; right: -2px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #f04452;
  }
  .service-label {
    position: absolute;
    bottom: 6.5px;
    left: 0; right: 0;
    font-size: 12px;

     34x5 컨테이너: 활성 = 14x5 bar (rounded 2.5), 비활성 = 5x5 dot */
  .service-indicator {

    cursor: pointer;

  .service-indicator .dot.active {

    background: #191919;
  }

    var HomeComponents = {

         좌: pay_logo(40×14) + amount(Bold 15)
         우: buttons(Medium 14), 구분선 0.5×13 */
      PayStrip: function (p) {
        var btns = p.buttons.map(function (b, i) {
          var divider = i > 0 ? '<span class="divider" aria-hidden="true"></span>' : '';
          var icon = b.icon
            ? '<img class="pay-ico" src="' + b.icon + '" alt="" aria-hidden="true" />'
            : '';
          return divider + '<span>' + icon + b.label + '</span>';
        }).join('');

          '<div class="pay-strip" role="group" aria-label="카카오페이 요약">' +
            '<div class="pay-left">' +

          var cellsHtml = page.cells.map(function (c) {

              '<div class="service-cell">' +
                '<span class="service-icon">' +

                  badge +
                '</span>' +
                '<span class="service-label">' + c.label + '</span>' +
              '</div>'
            );
          }).join('');
          var emptyHtml = '';
          if (page.emptyCount) {
            for (var e = 0; e < page.emptyCount; e++) {
              emptyHtml += '<div class="service-cell empty" aria-hidden="true"></div>';
            }
          }
          return (
            '<div class="service-page" data-page="' + pi + '" aria-label="' + page.ariaLabel + '">' +
              cellsHtml + emptyHtml +
            '</div>'
          );
        }).join('');

          '<div class="service-shortcut" aria-label="서비스 바로가기">' +
            '<div class="service-pages" id="servicePages" role="region" aria-label="서비스 페이지" tabindex="0">' +

              '<span class="dot"        role="tab" aria-selected="false" data-goto="2"></span>' +

         img area: inset 0 0 45px 0 / AD badge top-right 8px

      },

      /* ④ GamePlay
         Spec: white bg, radius 10, padding 16, border rgba(0,0,0,0.04)
         banner(22px icon + text), game-list 3col grid, divider, stat rows */
      GamePlay: function (p) {
        var gamesHtml = p.games.map(function (g, i) {
          var badgeHtml = g.badge ? '<span class="game-badge">' + g.badge + '</span>' : '';
          var isFirst = i === 0;
          var isLast  = i === p.games.length - 1;
          var ml = isFirst ? ' style="margin-left:16px' + (isLast ? ';margin-right:16px' : '') + '"' : (isLast ? ' style="margin-right:16px"' : '');
          return (
            '<div class="game-item"' + ml + '>' +
              '<div class="game-thumb ' + g.thumbClass + '" role="img" aria-label="' + g.title + ' 썸네일">' +
                badgeHtml +
              '</div>' +
              '<div class="game-title">' + g.title + '</div>' +
              '<div class="game-play-count">' +
                '<img src="' + g.playcountIcon + '" alt="" aria-hidden="true" />' +
                g.playCount +
              '</div>' +
            '</div>'
          );
        }).join('');
        var statsHtml = p.stats.map(function (s) {
          return (
            '<div class="game-stat">' +
              '<span class="game-stat-ico" aria-hidden="true"><img src="' + s.icon + '" alt="" /></span>' +
              '<span class="game-stat-label">' + s.label + '</span>' +
              '<span class="game-stat-value">' +
                s.value +
                '<img src="' + s.arrowIcon + '" alt="" aria-hidden="true" />' +
              '</span>' +
            '</div>'
          );
        }).join('');
        return (
          '<div>' +
            '<div class="home-subtitle">' + p.title + '</div>' +
            '<div class="game-card">' +
              '<div class="game-banner">' +
                '<span class="game-banner-ico" aria-hidden="true"><img src="' + p.banner.icon + '" alt="" /></span>' +
                '<span>' + p.banner.text + ' ' + p.banner.highlight + '</span>' +
              '</div>' +
              '<div class="game-list">' + gamesHtml + '</div>' +
              '<div class="game-divider"></div>' +
              '<div class="game-stats">' + statsHtml + '</div>' +
            '</div>' +
          '</div>'
        );
      },

      /* ⑤ KakaoNow
         Spec: 2-col grid gap 11, card aspect-ratio 175/204, radius 10
         PNG 3x 자산을 background-image로 사용 */
      KakaoNow: function (p) {
        var cardsHtml = p.cards.map(function (c, i) {
          var style = "background-image:url('" + c.image + "')";
          return (
            '<div class="kakaonow-card" style="' + style + '" role="img" aria-label="' + c.ariaLabel + '"></div>'
          );
        }).join('');
        return (
          '<div>' +
            '<div class="home-subtitle">' + p.title + '</div>' +
            '<div class="kakaonow-grid">' + cardsHtml + '</div>' +
          '</div>'
        );
      },

      /* ⑥ WeatherCard — Figma 5775:3010 HTML 구현
         Container: white bg, radius 12, shadow, padding 16, flex row
         좌: wc-info(위치명 + 날씨행) / 우: wc-loc-btn(28×28) */
      WeatherCard: function (p) {
        return (
          '<div class="weather-card">' +
            '<div class="wc-info">' +
              '<div class="wc-location">' + p.location + '</div>' +
              '<div class="wc-weather-row">' +
                '<div class="wc-current">' +
                  '<img class="wc-ico" src="' + p.tempIcon + '" alt="" aria-hidden="true" />' +
                  '<span class="wc-temp">' + p.temp + '</span>' +
                '</div>' +
                '<div class="wc-desc">' +
                  '<p class="wc-desc-line1">' + p.description + '</p>' +
                  '<p class="wc-desc-dust">' + p.dustLabel + '</p>' +
                  '<p class="wc-desc-level">' + p.dustLevel + '</p>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<button type="button" class="wc-loc-btn" aria-label="위치 변경">' +
              '<img class="wc-loc-oval" src="' + p.locOvalIcon + '" alt="" aria-hidden="true" />' +
              '<img class="wc-loc-ico" src="' + p.locIcon + '" alt="" aria-hidden="true" />' +
            '</button>' +
          '</div>'
        );
      },

      /* ⑦ LocalAd
         Spec: white bg, radius 10, PNG 3x 풀 카드 이미지 */
      LocalAd: function (p) {
        return (
          '<div class="local-ad">' +
            '<img src="' + p.image + '" alt="' + p.alt + '" />' +
          '</div>'
        );
      }

    }; // END HomeComponents


    /* ── 렌더링 실행 ─────────────────────────────────────────────
       HOME_COMPONENTS 배열을 순회하며 각 컴포넌트를 #homeScreen에 주입.
       이 스크립트 블록은 기존 carousel/scroll JS보다 먼저 실행되어
       #servicePages, .service-indicator 등 DOM이 미리 준비됨.   */
    (function () {
      var el = document.getElementById('homeScreen');
      if (!el) return;
      el.innerHTML = HOME_COMPONENTS.map(function (item) {
        var render = HomeComponents[item.type];
        if (!render) {
          console.warn('[HomeComponents] Unknown type:', item.type);
          return '';
        }
        return render(item.props);
      }).join('\n');
    })();
  </script>

  <script>
    /* 칩 클릭 → 화면 전환 (홈 ↔ 발견)
       - chip-bar의 각 .chip에 data-screen을 부여하고 클릭 시 해당 .screen[data-screen=...]을 활성화.
       - 현재 구현된 화면: '홈', '발견'. 지갑/게임은 자리만 잡아두고 클릭해도 화면 전환은 하지 않음.
       - 전환 시 스크롤 최상단으로 리셋하고, .top 의 is-hidden 상태도 초기화.
       - activate()를 window.MoreTab에 노출 → 더보기 탭 클릭 �핸들러에서 재사용. */
    (function () {
      var chips = document.querySelectorAll('.chip-bar .chip');
      if (!chips.length) return;

      // 칩 텍스트 → data-screen 매핑 (구현된 화면만)
      var SCREEN_BY_LABEL = { '홈': 'home', '지갑': 'wallet' };

      chips.forEach(function (chip) {
        var label = (chip.textContent || '').trim();
        var key = SCREEN_BY_LABEL[label];
        if (key) chip.setAttribute('data-screen', key);
        chip.setAttribute('role', 'tab');
      });

      function activate(screenKey) {
        // 칩 active 토글
        chips.forEach(function (c) {
          if (c.getAttribute('data-screen') === screenKey) c.classList.add('active');
          else c.classList.remove('active');
        });
        // 화면 토글
        var screens = document.querySelectorAll('.screen');
        screens.forEach(function (s) {
          if (s.getAttribute('data-screen') === screenKey) s.classList.add('is-active');
          else s.classList.remove('is-active');
        });
        // 지갑칩 활성 시 bg-gradient 숨김
        document.body.classList.toggle('wallet-active', screenKey === 'wallet');
        // 스크롤 리셋 + 헤더 reveal
        window.scrollTo({ top: 0, behavior: 'auto' });
        var topEl = document.querySelector('.top');
        if (topEl) {
          topEl.classList.remove('is-hidden');
          topEl.classList.remove('has-scroll');
        }
      }

      chips.forEach(function (chip) {
        chip.addEventListener('click', function () {
          var key = chip.getAttribute('data-screen');
          if (!key) return; // 지갑/게임은 화면 구현 전이므로 무시
          if (chip.classList.contains('active')) return; // 이미 활성화된 칩은 스킵
          activate(key);
        });
      });

      // activate() 외부 노출 — 더보기 탭 클릭 핸들러에서 사용
      window.MoreTab = window.MoreTab || {};
      window.MoreTab.activate = activate;
      window.MoreTab.getActiveScreen = function () {
        var active = document.querySelector('.screen.is-active');
        return active ? active.getAttribute('data-screen') : null;
      };
    })();

    /* 더보기 탭 클릭 인터랙션
       - 스크롤 중(scrollY > 0) : 최상단으로 smooth 스크롤
       - 이미 최상단(scrollY === 0) : 홈↔발견 칩 스위칭 */
    (function () {
      var moreTab = document.querySelector('.tab.more');
      if (!moreTab) return;

      moreTab.addEventListener('click', function () {
        if ((window.scrollY || window.pageYOffset || 0) > 0) {
          // 스크롤 위치가 있으면 최상단으로 이동
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          // 이미 최상단이면 홈↔지갑 토글
          var mt = window.MoreTab;
          if (!mt) return;
          var current = mt.getActiveScreen();
          var next = current === 'home' ? 'wallet' : 'home';
          mt.activate(next);
        }
      });
    })();

    /* 상단 헤더(.top)의 스크롤 연동 인터랙션
       1) 아래로 스크롤 시작 → 위로 슬라이드 업(is-hidden 추가, 240ms)
       2) 다시 위로 스크롤 → 슬라이드 다운(is-hidden 제거, 160ms)
       3) 최상단이 아니면 chip-bar 하단에 스크롤 디바이더 라인 노출(has-scroll 추가)
       - threshold로 미세한 떨림 방지
       - rAF로 스크롤 이벤트 쓰로틀링 */
    (function () {
      var topEl = document.querySelector('.top');
      if (!topEl) return;

      var lastY = window.scrollY || window.pageYOffset || 0;
      var ticking = false;
      var threshold = 6;       // 방향 전환 인정 최소 이동 픽셀
      var revealAt = 0;        // 최상단에 가까우면 무조건 노출

      function update() {
        ticking = false;
        var y = window.scrollY || window.pageYOffset || 0;
        var delta = y - lastY;

        // 스크롤 디바이더: 최상단이 아니면 노출
        if (y > 0) {
          topEl.classList.add('has-scroll');
        } else {
          topEl.classList.remove('has-scroll');
        }

        // 최상단 근처에서는 헤더 항상 표시
        if (y <= revealAt) {
          topEl.classList.remove('is-hidden');
          lastY = y;
          return;
        }

        // 최하단 탄성(bounce) 감지: 바닥 근처면 노출 억제
        var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        var nearBottom = maxScroll > 0 && y >= maxScroll - 24;

        if (delta > threshold) {
          // 아래로 스크롤 → 숨김
          topEl.classList.add('is-hidden');
          lastY = y;
        } else if (delta < -threshold && !nearBottom) {
          // 위로 스크롤 → 노출 (단, 최하단 bounce 구간은 제외)
          topEl.classList.remove('is-hidden');
          lastY = y;
        }
      }

      window.addEventListener('scroll', function () {
        if (!ticking) {
          window.requestAnimationFrame(update);
          ticking = true;
        }
      }, { passive: true });
    })();

    /* Service Shortcut: 가로 스와이프 → 인디케이터 동기화
       - scroll 이벤트로 현재 페이지 인덱스 계산 (Math.round)
       - dot.active 토글 (CSS transition으로 14px ↔ 5px 보간)
       - dot 클릭 시 해당 페이지로 scroll-snap (smooth) */
    (function () {
      var pagesEl = document.getElementById('servicePages');
      if (!pagesEl) return;
      var dots = document.querySelectorAll('.service-indicator .dot');
      if (dots.length !== 3) return;

      var ticking = false;
      function update() {
        var w = pagesEl.clientWidth;
        if (!w) { ticking = false; return; }
        var idx = Math.round(pagesEl.scrollLeft / w);
        if (idx < 0) idx = 0;
        if (idx > 2) idx = 2;
        dots.forEach(function (d, i) {
          var on = i === idx;
          d.classList.toggle('active', on);
          d.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        ticking = false;
      }

      pagesEl.addEventListener('scroll', function () {
        if (!ticking) {
          window.requestAnimationFrame(update);
          ticking = true;
        }
      }, { passive: true });

      dots.forEach(function (d, i) {
        d.addEventListener('click', function () {
          var w = pagesEl.clientWidth;
          pagesEl.scrollTo({ left: w * i, behavior: 'smooth' });
        });
      });

      // 초기 인디케이터 정합 + 리사이즈 대응 (반응형 width 변경 시)
      window.addEventListener('load', update);
      window.addEventListener('resize', function () {
        // 페이지 인덱스를 유지한 채 scrollLeft 재계산
        var w = pagesEl.clientWidth;
        var current = 0;
        dots.forEach(function (d, i) { if (d.classList.contains('active')) current = i; });
        pagesEl.scrollLeft = w * current;
      });
    })();

    /* PWA standalone 모드 감지 → <html data-standalone="true"> 설정
       @media (display-mode: standalone) CSS와 이중 분기 */
    (function () {
      var isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      if (isStandalone) {
        document.documentElement.setAttribute('data-standalone', 'true');
      }
    })();

    /* Add to Home Screen 안내
       - iOS Safari에서만(비-standalone 상태) 노출
       - 사용자가 ×로 닫으면 sessionStorage에 기록 → 같은 세션 내 재노출 방지
       - 이미 standalone으로 띄웠거나, iOS가 아닌 환경에서는 노출 안 함 */
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      var dismissed = false;
      try { dismissed = sessionStorage.getItem('a2hs_dismissed') === '1'; } catch (e) {}

      if (!isIOS || isStandalone || dismissed) return;

      var banner = document.getElementById('a2hsBanner');
      var closeBtn = document.getElementById('a2hsClose');
      if (!banner || !closeBtn) return;

      // 첫 렌더 이후 약간 딜레이 주고 스르륵 등장
      banner.style.display = 'flex';
      setTimeout(function () {
        banner.classList.add('is-visible');
      }, 700);

      closeBtn.addEventListener('click', function () {
        banner.classList.remove('is-visible');
        try { sessionStorage.setItem('a2hs_dismissed', '1'); } catch (e) {}
        setTimeout(function () {
          banner.style.display = 'none';
        }, 320);
      });
    })();
  </script>
